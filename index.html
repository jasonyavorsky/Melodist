<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melodist — Random Melody Generator</title>
  <link rel="icon" type="image/png" href="/assets/favicon.ico" />
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg class="w-7 h-7 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <h1 class="text-xl font-semibold tracking-tight">Melodist</h1>
      </div>
      <div class="text-xs text-slate-400 hidden sm:flex items-center gap-3">
        <span class="flex items-center gap-1"><kbd class="kbd">Space</kbd> Play/Stop</span>
        <span class="flex items-center gap-1"><kbd class="kbd">R</kbd> Randomize</span>
        <span class="flex items-center gap-1"><kbd class="kbd">E</kbd> Export</span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_280px] gap-8">

      <!-- Left Column: Controls + Notation -->
      <div class="space-y-6">

        <!-- Controls Card -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">

          <!-- Row 1: Key, Scale, Time Signature -->
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
            <div>
              <label for="key-select" class="block text-sm font-medium text-slate-600 mb-1.5">Key</label>
              <select id="key-select" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <option value="" disabled selected>Select a key</option>
              </select>
            </div>
            <div>
              <label for="scale-select" class="block text-sm font-medium text-slate-600 mb-1.5">Scale</label>
              <select id="scale-select" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <option value="" disabled selected>Select a scale</option>
              </select>
            </div>
            <div>
              <label for="timesig-select" class="block text-sm font-medium text-slate-600 mb-1.5">Time Signature</label>
              <select id="timesig-select" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <option value="" disabled selected>Select</option>
              </select>
            </div>
          </div>

          <!-- Row 2: BPM + Measures -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1.5">
                BPM: <span id="bpm-output" class="text-indigo-600 font-semibold"></span>
              </label>
              <input type="range" id="bpm-range" min="1" max="300" value="65" />
              <div class="flex items-center gap-2 mt-2">
                <button id="btn-tap-tempo" class="text-xs px-3 py-1 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-100 transition-colors">
                  Tap Tempo
                </button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1.5">
                Measures: <span id="measure-output" class="text-indigo-600 font-semibold"></span>
              </label>
              <input type="range" id="measure-range" min="2" max="28" value="2" step="2" />
            </div>
          </div>

          <!-- Row 3: Octave Range -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1.5">
                Octave Min: <span id="octave-min-output" class="text-indigo-600 font-semibold"></span>
              </label>
              <input type="range" id="octave-min" min="1" max="7" value="4" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1.5">
                Octave Max: <span id="octave-max-output" class="text-indigo-600 font-semibold"></span>
              </label>
              <input type="range" id="octave-max" min="1" max="7" value="5" />
            </div>
          </div>

          <!-- Row 4: Note Type Toggles -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-slate-600 mb-3">Note Types</label>
            <div class="flex flex-wrap gap-6">
              <label class="toggle-group">
                <input type="checkbox" id="quarter-toggle" checked />
                <span class="toggle-track"><span class="toggle-dot"></span></span>
                <span class="text-sm text-slate-600">Quarter</span>
              </label>
              <label class="toggle-group">
                <input type="checkbox" id="eighth-toggle" checked />
                <span class="toggle-track"><span class="toggle-dot"></span></span>
                <span class="text-sm text-slate-600">Eighth</span>
              </label>
              <label class="toggle-group">
                <input type="checkbox" id="sixteenth-toggle" />
                <span class="toggle-track"><span class="toggle-dot"></span></span>
                <span class="text-sm text-slate-600">Sixteenth</span>
              </label>
              <label class="toggle-group">
                <input type="checkbox" id="rests-toggle" />
                <span class="toggle-track"><span class="toggle-dot"></span></span>
                <span class="text-sm text-slate-600">Rests</span>
              </label>
            </div>
          </div>

          <!-- Metronome + Mode -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-slate-600 mb-3">Playback</label>
            <div class="flex flex-wrap gap-6 items-center">
              <label class="toggle-group">
                <input type="checkbox" id="metronome-toggle" />
                <span class="toggle-track"><span class="toggle-dot"></span></span>
                <span class="text-sm text-slate-600">Metronome</span>
              </label>
              <label class="toggle-group" title="Generates melodies with stepwise motion and directional flow instead of random leaps">
                <input type="checkbox" id="logical-toggle" checked />
                <span class="toggle-track"><span class="toggle-dot"></span></span>
                <span class="text-sm text-slate-600">Logical Mode</span>
              </label>
              <div class="flex items-center gap-2">
                <label for="cadence-select" class="text-sm text-slate-600 whitespace-nowrap">Intro cadence</label>
                <select id="cadence-select" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                  <option value="none">None</option>
                  <option value="2-5-1">II–V–I</option>
                  <option value="1-4-5">IV–V–I</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="flex flex-wrap gap-3">
            <button id="btn-randomize" class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors shadow-sm">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
              Randomize
            </button>
            <button id="btn-play" class="inline-flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Play
            </button>
            <button id="btn-stop" class="inline-flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
              Stop
            </button>
            <button id="btn-export" class="inline-flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export MIDI
            </button>
          </div>
        </div>

        <!-- Notation Display -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
          <h2 class="text-sm font-medium text-slate-500 mb-4">Sheet Music</h2>
          <div id="notation-container" class="overflow-x-auto min-h-[200px] flex items-center justify-center">
            <p id="notation-placeholder" class="text-slate-300 text-sm italic">Select a key and scale, then click Randomize</p>
          </div>
        </div>
      </div>

      <!-- Right Column: History -->
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 h-fit lg:sticky lg:top-8">
        <h2 class="text-sm font-medium text-slate-500 mb-3 flex items-center gap-2">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          History
        </h2>
        <div id="history-list" class="space-y-1.5 max-h-[600px] overflow-y-auto">
          <p class="text-sm text-slate-400 italic">No melodies generated yet</p>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="max-w-6xl mx-auto px-6 py-6 mt-8 border-t border-slate-200">
    <p class="text-xs text-slate-400 text-center">
      <a href="https://github.com/jasonyavorsky/Melodist" class="text-indigo-500 hover:text-indigo-600">Melodist</a> &mdash; Random Melody Generator &middot; Built by
      <a href="https://github.com/mwin96" class="text-indigo-500 hover:text-indigo-600">Michael Win</a>,
      <a href="https://github.com/thl024" class="text-indigo-500 hover:text-indigo-600">Timothy Lam</a> &amp;
      <a href="https://github.com/jasonyavorsky" class="text-indigo-500 hover:text-indigo-600">Jason Yavorsky</a>
    </p>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
